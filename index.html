<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Siggy Soul Forge ✦</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Nunito:wght@300;400;600;700;800&display=swap');

  :root {
    --deep: #04020f;
    --purple1: #1a0533;
    --purple2: #3b1070;
    --accent: #c084fc;
    --pink: #f0abfc;
    --cyan: #67e8f9;
    --gold: #fbbf24;
    --white: #f0e6ff;
    --glow: 0 0 20px #c084fc88, 0 0 40px #7c3aed44;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    font-family: 'Nunito', sans-serif;
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── STARFIELD ── */
  #stars-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity .6s, transform .6s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(.96); }

  /* ══════════════════════════════════
     SCREEN 1 – PET THE CAT
  ══════════════════════════════════ */
<script>

let petCount = 0
const cat = document.getElementById("catWrap")
const btn = document.getElementById("proceedBtn")

cat.addEventListener("click", () => {

  if(petCount >= 5) return

  petCount++

  cat.className = "cat-wrap pet-" + petCount

  document.getElementById("paw"+petCount).classList.add("filled")

  const heart = document.createElement("div")
  heart.className = "heart-burst"
  heart.innerHTML = "❤️"

  cat.appendChild(heart)

  setTimeout(()=>{
    heart.remove()
  },800)

  if(petCount === 5){

    cat.classList.add("pet-done")

    btn.classList.add("show")

  }

})

</script>

  /* ══════════════════════════════════
     SCREEN 2 – REGISTER
  ══════════════════════════════════ */
  #screen-register {
    background: radial-gradient(ellipse at 50% 50%, #1a053388 0%, transparent 70%);
  }

  .register-card {
    background: linear-gradient(145deg, #160430ee, #0d0220ee);
    border: 1px solid #7c3aed66;
    border-radius: 24px;
    padding: 36px 40px;
    width: min(420px, 92vw);
    box-shadow: 0 8px 40px #7c3aed33, inset 0 1px 0 #c084fc22;
    text-align: center;
  }

  .register-card h2 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1.1rem;
    color: var(--pink);
    text-shadow: var(--glow);
    margin-bottom: 6px;
  }
  .register-card p { font-size: .85rem; color: var(--accent); margin-bottom: 24px; }

  .field-wrap { margin-bottom: 18px; text-align: left; }
  .field-wrap label { display: block; font-size: .82rem; color: var(--accent); margin-bottom: 6px; letter-spacing: .05em; }
  .field-wrap input {
    width: 100%;
    background: #0d0220;
    border: 1.5px solid #7c3aed66;
    border-radius: 12px;
    padding: 11px 16px;
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-size: .95rem;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .field-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 12px #c084fc44; }
  .field-wrap input::placeholder { color: #6b4fa0; }

  .discord-check {
    font-size: .75rem; color: #f87171;
    margin-top: 6px; display: none;
  }
  .discord-check.show { display: block; }

  .enter-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none; border-radius: 14px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 800;
    cursor: pointer;
    letter-spacing: .08em;
    box-shadow: var(--glow);
    transition: transform .2s, opacity .2s;
    margin-top: 4px;
  }
  .enter-btn:hover { transform: scale(1.03); }

  /* ══════════════════════════════════
     SCREEN 3 – CHAT
  ══════════════════════════════════ */
  #screen-chat {
    flex-direction: column;
    padding: 0;
    justify-content: flex-start;
    background: linear-gradient(180deg, #04020f 0%, #100225 100%);
  }

  .chat-header {
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid #7c3aed33;
    background: #08011888;
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 20;
  }

  .siggy-pfp-wrap {
    position: relative;
    width: 52px; height: 52px; flex-shrink: 0;
  }
  .siggy-pfp {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    object-fit: cover;
    box-shadow: 0 0 16px #c084fc88;
    animation: pfpBob 3s ease-in-out infinite;
  }
  @keyframes pfpBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

  .status-dot {
    position: absolute; bottom: 2px; right: 2px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #4ade80;
    border: 2px solid var(--deep);
    animation: statusPulse 2s ease-in-out infinite;
  }
  @keyframes statusPulse { 0%,100% { box-shadow: 0 0 0 0 #4ade8066; } 50% { box-shadow: 0 0 0 5px transparent; } }

  .header-info h3 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: .9rem;
    color: var(--pink);
    text-shadow: 0 0 10px #f0abfc88;
  }
  .header-info span { font-size: .75rem; color: var(--accent); }

  .mood-badge {
    margin-left: auto;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .05em;
    border: 1px solid currentColor;
    transition: all .4s;
  }
  .mood-badge.happy { color: #f0abfc; border-color: #f0abfc44; background: #f0abfc11; }
  .mood-badge.curious { color: #67e8f9; border-color: #67e8f944; background: #67e8f911; }
  .mood-badge.annoyed { color: #fb923c; border-color: #fb923c44; background: #fb923c11; }
  .mood-badge.angry { color: #f87171; border-color: #f8717144; background: #f8717111; }
  .mood-badge.love { color: #fb7185; border-color: #fb718544; background: #fb718511; }

  /* MESSAGES */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
    scroll-behavior: smooth;
  }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-thumb { background: #7c3aed55; border-radius: 10px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn .35s ease;
    max-width: 85%;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user { flex-direction: row-reverse; align-self: flex-end; }

  .msg-pfp {
    width: 38px; height: 38px;
    border-radius: 50%;
    flex-shrink: 0;
    object-fit: cover;
    border: 2px solid #7c3aed66;
  }
  .msg.user .msg-pfp { border-color: #67e8f966; }

  .msg-bubble {
    padding: 11px 16px;
    border-radius: 18px;
    font-size: .9rem;
    line-height: 1.5;
    max-width: 100%;
    word-break: break-word;
  }
  .msg.siggy .msg-bubble {
    background: linear-gradient(135deg, #1a0533, #2d0a5e);
    border: 1px solid #7c3aed55;
    border-bottom-left-radius: 4px;
    color: var(--white);
    box-shadow: 0 2px 12px #7c3aed22;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #1e3a5f, #1e4976);
    border: 1px solid #67e8f944;
    border-bottom-right-radius: 4px;
    color: var(--white);
  }

  .msg-name {
    font-size: .7rem;
    margin-bottom: 3px;
    opacity: .6;
    letter-spacing: .04em;
  }

  /* typing dots */
  .typing-bubble {
    display: flex; align-items: center; gap: 5px;
    padding: 12px 18px;
  }
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes typingBounce { 0%,100% { transform: translateY(0); opacity: .4; } 50% { transform: translateY(-5px); opacity: 1; } }

  /* INPUT BAR */
  .input-bar {
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
    padding: 14px 20px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-top: 1px solid #7c3aed22;
  }

  .chat-input {
    flex: 1;
    background: #0d0220;
    border: 1.5px solid #7c3aed66;
    border-radius: 50px;
    padding: 12px 20px;
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-size: .93rem;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .chat-input:focus { border-color: var(--accent); box-shadow: 0 0 14px #c084fc33; }
  .chat-input::placeholder { color: #6b4fa0; }

  .send-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    box-shadow: var(--glow);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.1) rotate(10deg); }

  /* Particle canvas */
  #particle-canvas {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<canvas id="particle-canvas"></canvas>

<!-- ══════ SCREEN 1: PET THE CAT ══════ -->
<div class="screen" id="screen-pet">
  <p class="title-text">✦ SIGGY SOUL FORGE ✦</p>
  <p class="subtitle-text">ᓚ₍⑅^..^₎♡ pet siggy to begin the ritual ᓚ₍⑅^..^₎♡</p>

  <div class="cat-wrap" id="catWrap" onclick="petCat()">
    <div class="aura"></div>
    <div class="cat-body">
      <!-- Siggy — simple chibi cat -->
      <svg id="siggySvg" viewBox="0 0 200 220" width="200" height="220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bodyGrad" cx="50%" cy="60%" r="50%">
            <stop offset="0%" stop-color="#1c1435"/>
            <stop offset="100%" stop-color="#07040f"/>
          </radialGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="softglow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>

        <!-- Glow aura behind body -->
        <ellipse cx="100" cy="150" rx="60" ry="55" fill="#7c3aed" opacity=".12" filter="url(#softglow)"/>

        <!-- Tail (curled to side) -->
        <path d="M140 185 Q175 175 172 155 Q169 138 155 145 Q148 150 152 160" fill="none" stroke="#1c1435" stroke-width="14" stroke-linecap="round"/>
        <path d="M140 185 Q175 175 172 155 Q169 138 155 145 Q148 150 152 160" fill="none" stroke="#2d1a50" stroke-width="8" stroke-linecap="round" opacity=".6"/>

        <!-- Body — round chonky -->
        <ellipse cx="100" cy="162" rx="52" ry="48" fill="url(#bodyGrad)"/>

        <!-- Tummy highlight -->
        <ellipse cx="100" cy="168" rx="24" ry="22" fill="#1e1640" opacity=".5"/>

        <!-- Front legs / paws -->
        <ellipse cx="72" cy="200" rx="18" ry="12" fill="#130e22"/>
        <ellipse cx="128" cy="200" rx="18" ry="12" fill="#130e22"/>
        <!-- toe beans left -->
        <ellipse cx="65" cy="205" rx="5" ry="3.5" fill="#2a1848"/>
        <ellipse cx="75" cy="207" rx="5" ry="3.5" fill="#2a1848"/>
        <!-- toe beans right -->
        <ellipse cx="121" cy="207" rx="5" ry="3.5" fill="#2a1848"/>
        <ellipse cx="133" cy="205" rx="5" ry="3.5" fill="#2a1848"/>

        <!-- Sigil on chest -->
        <g transform="translate(83,148)" filter="url(#glow)">
          <rect x="0" y="0" width="34" height="34" rx="3" transform="rotate(45 17 17)" fill="none" stroke="#d946ef" stroke-width="1.8" opacity=".9"/>
          <rect x="6" y="6" width="22" height="22" rx="2" transform="rotate(45 17 17)" fill="none" stroke="#a855f7" stroke-width="1.2" opacity=".7"/>
          <line x1="17" y1="4" x2="17" y2="30" stroke="#c084fc" stroke-width="1.2" opacity=".8"/>
          <line x1="4" y1="17" x2="30" y2="17" stroke="#c084fc" stroke-width="1.2" opacity=".8"/>
          <rect x="13" y="13" width="8" height="8" rx="1" fill="#e879f9" opacity=".7"/>
        </g>

        <!-- Head — big round chibi -->
        <ellipse cx="100" cy="100" rx="52" ry="50" fill="url(#bodyGrad)"/>

        <!-- Ears — pointy triangles -->
        <polygon points="62,72 52,38 82,60" fill="#130e22"/>
        <polygon points="138,72 148,38 118,60" fill="#130e22"/>
        <!-- ear inner pink -->
        <polygon points="64,70 56,44 80,62" fill="#7c3aed" opacity=".35"/>
        <polygon points="136,70 144,44 120,62" fill="#7c3aed" opacity=".35"/>

        <!-- Eyes — big sparkly -->
        <!-- eye whites -->
        <ellipse cx="84" cy="100" rx="14" ry="15" fill="#0d0a1a"/>
        <ellipse cx="116" cy="100" rx="14" ry="15" fill="#0d0a1a"/>
        <!-- iris purple glow -->
        <ellipse id="irisL" cx="84" cy="100" rx="10" ry="11" fill="#d946ef" filter="url(#glow)" opacity=".9"/>
        <ellipse id="irisR" cx="116" cy="100" rx="10" ry="11" fill="#d946ef" filter="url(#glow)" opacity=".9"/>
        <!-- pupil -->
        <ellipse id="pupilL" cx="84" cy="101" rx="6" ry="9" fill="#000"/>
        <ellipse id="pupilR" cx="116" cy="101" rx="6" ry="9" fill="#000"/>
        <!-- shine dots -->
        <circle cx="89" cy="95" r="3" fill="#fff" opacity=".95"/>
        <circle cx="121" cy="95" r="3" fill="#fff" opacity=".95"/>
        <circle cx="86" cy="107" r="1.5" fill="#fff" opacity=".5"/>
        <circle cx="118" cy="107" r="1.5" fill="#fff" opacity=".5"/>

        <!-- Nose + mouth -->
        <ellipse cx="100" cy="115" rx="4" ry="2.8" fill="#f9a8d4" opacity=".9"/>
        <path d="M97 118 Q100 122 103 118" fill="none" stroke="#f9a8d4" stroke-width="1.4" stroke-linecap="round"/>

        <!-- Blush -->
        <ellipse cx="72" cy="116" rx="11" ry="7" fill="#f43f5e" opacity=".18"/>
        <ellipse cx="128" cy="116" rx="11" ry="7" fill="#f43f5e" opacity=".18"/>

        <!-- Whiskers -->
        <line x1="88" y1="114" x2="48" y2="108" stroke="#c4b0e0" stroke-width="1.1" opacity=".65"/>
        <line x1="88" y1="117" x2="46" y2="118" stroke="#c4b0e0" stroke-width="1.1" opacity=".65"/>
        <line x1="112" y1="114" x2="152" y2="108" stroke="#c4b0e0" stroke-width="1.1" opacity=".65"/>
        <line x1="112" y1="117" x2="154" y2="118" stroke="#c4b0e0" stroke-width="1.1" opacity=".65"/>

        <!-- Happy expression overlay (shown on pet-done) -->
        <g id="happyFace" opacity="0">
          <!-- squished happy eyes -->
          <path d="M74 100 Q84 92 94 100" fill="none" stroke="#f0abfc" stroke-width="3" stroke-linecap="round"/>
          <path d="M106 100 Q116 92 126 100" fill="none" stroke="#f0abfc" stroke-width="3" stroke-linecap="round"/>
          <!-- bigger blush -->
          <ellipse cx="68" cy="116" rx="14" ry="9" fill="#f43f5e" opacity=".3"/>
          <ellipse cx="132" cy="116" rx="14" ry="9" fill="#f43f5e" opacity=".3"/>
        </g>
      </svg>
    </div>
  </div>

  <div class="pet-counter">
    <div class="paw-dot" id="dot0"></div>
    <div class="paw-dot" id="dot1"></div>
    <div class="paw-dot" id="dot2"></div>
    <div class="paw-dot" id="dot3"></div>
    <div class="paw-dot" id="dot4"></div>
  </div>
  <p class="pet-hint" id="petHint">🐾 click siggy to pet her... ฅ^•ﻌ•^ฅ</p>
  <button class="proceed-btn" id="proceedBtn" onclick="gotoRegister()">✦ enter the forge ✦</button>
</div>

<!-- ══════ SCREEN 2: REGISTER ══════ -->
<div class="screen hidden" id="screen-register">
  <div class="register-card">
    <h2>✦ Soul Registry ✦</h2>
    <p>tell siggy who you are before entering ᓚ₍⑅^..^₎♡</p>

    <div class="field-wrap">
      <label>YOUR NICKNAME</label>
      <input type="text" id="inputNick" placeholder="what shall siggy call you?..." maxlength="24"/>
    </div>
    <div class="field-wrap">
      <label>DISCORD USERNAME <span style="color:#f87171">*required</span></label>
      <input type="text" id="inputDiscord" placeholder="your_username (no @ needed)" maxlength="32"/>
      <div class="discord-check" id="discordErr">⚠ discord username required to enter the forge!</div>
    </div>

    <button class="enter-btn" onclick="enterForge()">ᓚ₍⑅^..^₎♡ summon siggy ᓚ₍⑅^..^₎♡</button>
  </div>
</div>

<!-- ══════ SCREEN 3: CHAT ══════ -->

<script>
// ═══════════════════════════════════════
//  STARS
// ═══════════════════════════════════════
const starsCanvas = document.getElementById('stars-canvas');
const sCtx = starsCanvas.getContext('2d');
let stars = [];

function resizeStars() {
  starsCanvas.width = window.innerWidth;
  starsCanvas.height = window.innerHeight;
  stars = Array.from({length: 180}, () => ({
    x: Math.random() * starsCanvas.width,
    y: Math.random() * starsCanvas.height,
    r: Math.random() * 1.8 + .3,
    a: Math.random(),
    speed: Math.random() * .004 + .002,
    color: ['#c084fc','#67e8f9','#f0abfc','#fbbf24','#fff'][Math.floor(Math.random()*5)]
  }));
}
function animateStars() {
  sCtx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
  const t = Date.now() * .001;
  stars.forEach(s => {
    s.a = .4 + Math.sin(t * s.speed * 200 + s.x) * .6;
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    sCtx.fillStyle = s.color;
    sCtx.globalAlpha = Math.max(0, s.a);
    sCtx.fill();
    sCtx.globalAlpha = 1;
  });
  requestAnimationFrame(animateStars);
}
resizeStars(); animateStars();
window.addEventListener('resize', resizeStars);

// ═══════════════════════════════════════
//  PARTICLES (floating magic dust)
// ═══════════════════════════════════════
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeP() { pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight; }
resizeP(); window.addEventListener('resize', resizeP);

function spawnParticle(x, y) {
  for(let i=0;i<8;i++) {
    const angle = Math.random()*Math.PI*2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (Math.random()*3+1),
      vy: Math.sin(angle) * (Math.random()*3+1) - 2,
      life: 1, decay: Math.random()*.03+.02,
      r: Math.random()*3+2,
      color: ['#c084fc','#f0abfc','#67e8f9','#fbbf24'][Math.floor(Math.random()*4)]
    });
  }
}

function animateP() {
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += .05; p.life -= p.decay;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, Math.max(0, p.r * p.life), 0, Math.PI*2);
    pCtx.fillStyle = p.color;
    pCtx.globalAlpha = p.life;
    pCtx.fill();
    pCtx.globalAlpha = 1;
  });
  requestAnimationFrame(animateP);
}
animateP();

const maxPets = 5;

// ─── MEOW SOUND ENGINE ───────────────────────────────────
let audioCtx = null;
function getCtx() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

const meowTypes = [
  () => playMeowA(),   // classic "miaow"
  () => playMeowB(),   // high "mrrp"
  () => playMeowC(),   // long dramatic meow
];

function playMeow() {
  try { meowTypes[Math.floor(Math.random()*meowTypes.length)](); } catch(e) {}
}

function makeVoice(ctx, t, freqPoints, gainPts, duration, vibrato=false) {
  // Carrier oscillator (main tone)
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  // Formant filter 1 (mouth shape "ee->aa->oh")
  const f1 = ctx.createBiquadFilter();
  f1.type = 'bandpass'; f1.Q.value = 6;
  // Formant filter 2 (nasal resonance)
  const f2 = ctx.createBiquadFilter();
  f2.type = 'bandpass'; f2.Q.value = 4;
  // Gain
  const gain = ctx.createGain();
  // Soft clip
  const wave = ctx.createWaveShaper();
  const curve = new Float32Array(256);
  for(let i=0;i<256;i++){const x=(i/128-1);curve[i]=x<0?-Math.pow(-x,.7):Math.pow(x,.7);}
  wave.curve = curve;

  osc.connect(f1); osc.connect(f2);
  f1.connect(wave); f2.connect(wave);
  wave.connect(gain); gain.connect(ctx.destination);

  // Frequency envelope
  freqPoints.forEach(([time, freq]) => {
    if(time === 0) osc.frequency.setValueAtTime(freq, t);
    else osc.frequency.linearRampToValueAtTime(freq, t + time);
  });

  // Formant envelope (mouth movement)
  const formantPts = freqPoints.map(([time, freq]) => [time, freq * 2.8]);
  formantPts.forEach(([time, freq]) => {
    if(time === 0) { f1.frequency.setValueAtTime(freq, t); f2.frequency.setValueAtTime(freq*1.5, t); }
    else { f1.frequency.linearRampToValueAtTime(freq, t+time); f2.frequency.linearRampToValueAtTime(freq*1.5, t+time); }
  });

  // Gain envelope
  gainPts.forEach(([time, val]) => {
    if(time === 0) gain.gain.setValueAtTime(val, t);
    else if(val <= 0.001) gain.gain.exponentialRampToValueAtTime(0.001, t+time);
    else gain.gain.linearRampToValueAtTime(val, t+time);
  });

  // Vibrato (for long meow)
  if(vibrato) {
    const vib = ctx.createOscillator();
    const vibGain = ctx.createGain();
    vib.frequency.value = 6; vibGain.gain.value = 18;
    vib.connect(vibGain); vibGain.connect(osc.frequency);
    vib.start(t + 0.1); vib.stop(t + duration);
  }

  osc.start(t); osc.stop(t + duration + 0.05);
}

function makeAvatar(seed) {
  const emojis = ['🦊','🐰','🐸','🦋','🌙','🦄','🐧','🦝','🐨','🦎','🌸','🦕','🐙','🐝','🦜','🍄','🐳','🦔','🌈','🦩'];

  const rng = (s, max) => { let h=0; for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;} return h%max; };
  const emoji = emojis[rng(seed, emojis.length)];
  const bg = bgs[rng(seed+'bg', bgs.length)];
  return `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"><rect width="40" height="40" fill="${bg.replace('#','%23')}" rx="20"/><text x="20" y="26" text-anchor="middle" font-size="18">${emoji}</text></svg>`;
}
